<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notas Android</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f3f4f6;
      padding: 15px;
      color: #222;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #0f172a;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 8px;
      margin-bottom: 12px;
      font-size: 16px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      cursor: pointer;
      margin: 5px 0;
      width: 100%;
    }

    .btn-add {
      background: #2563eb;
      color: white;
    }

    .btn-save {
      background: #16a34a;
      color: white;
    }

    .btn-load {
      background: #ea580c;
      color: white;
    }

    .btn-delete {
      background: #dc2626;
      color: white;
      margin-top: 10px;
    }

    .nota {
      border-left: 5px solid #2563eb;
    }

    .nota h3 {
      margin-bottom: 10px;
      color: #111827;
    }

    .nota p {
      white-space: pre-wrap;
      margin-bottom: 10px;
    }

    .data {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    .acoes {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .acoes button {
      width: 100%;
    }

    .btn-edit {
      background: #f59e0b;
      color: white;
    }

    .btn-remove {
      background: #dc2626;
      color: white;
    }

    @media (max-width: 600px) {
      .acoes {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📝 App de Notas</h1>

  <div class="card">
    <label>Título</label>
    <input type="text" id="titulo" placeholder="Título da nota">

    <label>Nota</label>
    <textarea id="conteudo" placeholder="Escreve aqui..."></textarea>

    <button class="btn-add" onclick="guardarNota()">➕ Guardar Nota</button>
  </div>

  <div class="card">
    <button class="btn-save" onclick="exportarNotas()">💾 Guardar em Ficheiro</button>

    <button class="btn-load" onclick="document.getElementById('importar').click()">
      📂 Abrir Ficheiro
    </button>

    <input type="file" id="importar" accept=".json" style="display:none">
  </div>

  <div id="listaNotas"></div>
</div>

<script>
  let notas = JSON.parse(localStorage.getItem('notasApp')) || [];
  let indiceEdicao = -1;

  function guardarLocal() {
    localStorage.setItem('notasApp', JSON.stringify(notas));
  }

  function limparCampos() {
    document.getElementById('titulo').value = '';
    document.getElementById('conteudo').value = '';
    indiceEdicao = -1;
  }

  function guardarNota() {
    const titulo = document.getElementById('titulo').value.trim();
    const conteudo = document.getElementById('conteudo').value.trim();

    if (!titulo || !conteudo) {
      alert('Preencha o título e a nota.');
      return;
    }

    const nota = {
      titulo,
      conteudo,
      data: new Date().toLocaleString('pt-PT')
    };

    if (indiceEdicao >= 0) {
      notas[indiceEdicao] = nota;
    } else {
      notas.unshift(nota);
    }

    guardarLocal();
    mostrarNotas();
    limparCampos();
  }

  function mostrarNotas() {
    const lista = document.getElementById('listaNotas');
    lista.innerHTML = '';

    if (notas.length === 0) {
      lista.innerHTML = '<div class="card">Sem notas guardadas.</div>';
      return;
    }

    notas.forEach((nota, index) => {
      const div = document.createElement('div');
      div.className = 'card nota';

      div.innerHTML = `
        <h3>${nota.titulo}</h3>
        <p>${nota.conteudo}</p>
        <div class="data">${nota.data}</div>

        <div class="acoes">
          <button class="btn-edit" onclick="editarNota(${index})">✏️ Editar</button>
          <button class="btn-remove" onclick="removerNota(${index})">🗑️ Apagar</button>
        </div>
      `;

      lista.appendChild(div);
    });
  }

  function editarNota(index) {
    document.getElementById('titulo').value = notas[index].titulo;
    document.getElementById('conteudo').value = notas[index].conteudo;
    indiceEdicao = index;

    window.scrollTo({
      top: 0,
      behavior: 'smooth'
    });
  }

  function removerNota(index) {
    if (confirm('Deseja apagar esta nota?')) {
      notas.splice(index, 1);
      guardarLocal();
      mostrarNotas();
    }
  }

  async function exportarNotas() {
    const dados = JSON.stringify(notas, null, 2);
    const blob = new Blob([dados], { type: 'application/json' });

    const ficheiro = new File([blob], 'notas.json', {
      type: 'application/json'
    });

    // Android e telemóveis
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [ficheiro] })) {
      try {
        await navigator.share({
          title: 'Notas',
          text: 'Exportação das notas',
          files: [ficheiro]
        });
        return;
      } catch (e) {
        console.log('Partilha cancelada');
      }
    }

    // PCs e navegadores compatíveis
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'notas.json';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    setTimeout(() => {
      URL.revokeObjectURL(link.href);
    }, 1000);
  }

  document.getElementById('importar').addEventListener('change', function(e) {
    const ficheiro = e.target.files[0];

    if (!ficheiro) return;

    const leitor = new FileReader();

    leitor.onload = function(event) {
      try {
        notas = JSON.parse(event.target.result);
        guardarLocal();
        mostrarNotas();
        alert('Notas importadas com sucesso!');
      } catch (erro) {
        alert('Erro ao abrir o ficheiro.');
      }
    };

    leitor.readAsText(ficheiro);
  });

  mostrarNotas();
</script>

</body>
</html>
